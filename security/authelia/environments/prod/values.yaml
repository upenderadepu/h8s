image:
  registry: harbor.okwilkins.dev/ghcr-cache
  pullSecrets:
    - harbor-credentials

secret:
  additionalSecrets:
    authelia-encryption-key: {}
    cnpg-authelia-prod-app-user-credentials: {}
    authelia-session-secret: {}
    authelia-hmac-secret: {}
    authelia-oidc-rsa-key: {}

pod:
  kind: Deployment
  replicas: 1
  securityContext:
    pod:
      fsGroup: 1000
    container:
      runAsUser: 1000
      runAsGroup: 1000
  initContainers:
    - name: setup-users-database
      image: harbor.okwilkins.dev/docker-hub-cache/busybox:1.37.0
      securityContext:
        runAsUser: 0
      command:
        - /bin/sh
        - -c
        - |
          PASSWORD_HASH=$(cat /tmp/password/hash)
          sed "s#PASSWORD_PLACEHOLDER#$PASSWORD_HASH#" /tmp/users_template/users_template.yml > /config/users_database.yml
          chown 1000:1000 /config/users_database.yml
          chmod 644 /config/users_database.yml
          echo "Users database created successfully"
      volumeMounts:
        - name: user-password
          mountPath: /tmp/password
          readOnly: true
        - name: users-template
          mountPath: /tmp/users_template
          readOnly: true
        - name: users-config
          mountPath: /config
  extraVolumes:
    - name: user-password
      secret:
        secretName: authelia-user-password
    - name: users-template
      configMap:
        name: authelia-users-template
    - name: users-config
      emptyDir: {}
    - name: oidc-rsa-key
      secret:
        secretName: authelia-oidc-rsa-key
    - name: grafana-client-secret
      secret:
        secretName: authelia-grafana-client-secret
    - name: argocd-client-secret
      secret:
        secretName: authelia-argocd-client-secret
  extraVolumeMounts:
    - name: users-config
      mountPath: /config
    - name: oidc-rsa-key
      mountPath: /secrets/oidc-rsa-key
      readOnly: true
    - name: grafana-client-secret
      mountPath: /secrets/grafana-client-secret
      readOnly: true
    - name: argocd-client-secret
      mountPath: /secrets/argocd-client-secret
      readOnly: true

# https://github.com/authelia/authelia/blob/v4.39.16/config.template.yml
configMap:
  log:
    level: info
  theme: auto

  # TODO: Add metrics
  # telemetry:

  webauthn:
    disable: false
    display_name: 'Authelia'
    enable_passkey_login: true

  server:
    endpoints:
      authz:
        ext-authz:
          implementation: "ExtAuthz"

  authentication_backend:
    file:
      enabled: true
      path: /config/users_database.yml

  session:
    encryption_key:
      disabled: false
      secret_name: authelia-session-secret
      path: session-secret

    cookies:
      - domain: okwilkins.dev
        subdomain: auth

  notifier:
    filesystem:
      enabled: true
      filename: /config/notification.txt

  access_control:
    default_policy: two_factor
    rules:
      - domain: "*.okwilkins.dev"
        policy: two_factor

  identity_providers:
    oidc:
      enabled: true
      hmac_secret:
        disabled: false
        secret_name: authelia-hmac-secret
        path: hmac-secret
      jwks:
        - key_id: default-rsa-key
          algorithm: RS256
          use: sig
          key:
            path: /secrets/oidc-rsa-key/oidc-rsa-key
      claims_policies:
        grafana:
          id_token:
            - email
            - name
            - groups
            - preferred_username
      clients:
        - client_id: grafana
          client_name: Grafana
          client_secret:
            path: /secrets/grafana-client-secret/client-secret-hash
          public: false
          authorization_policy: two_factor
          claims_policy: grafana
          token_endpoint_auth_method: client_secret_post
          require_pkce: true
          pkce_challenge_method: S256
          redirect_uris:
            - https://grafana.okwilkins.dev/login/generic_oauth
          scopes:
            - openid
            - profile
            - email
            - groups
        - client_id: argocd
          client_name: Argo CD
          client_secret:
            path: /secrets/argocd-client-secret/client-secret-hash
          public: false
          authorization_policy: two_factor
          token_endpoint_auth_method: client_secret_post
          redirect_uris:
            - https://argocd.okwilkins.dev/auth/callback
          scopes:
            - openid
            - groups
            - email
        - client_id: argocd-cli
          client_name: Argo CD (CLI)
          public: true
          authorization_policy: two_factor
          require_pkce: true
          pkce_challenge_method: S256
          redirect_uris:
            - http://localhost:8085/auth/callback
          scopes:
            - openid
            - offline_access
            - groups
            - email
          token_endpoint_auth_method: none

  storage:
    local:
      enabled: false
    postgres:
      enabled: true
      address: 'tcp://cnpg-authelia-prod-rw.authelia.svc.cluster.local:5432'
      database: authelia
      username: authelia
      password:
        disabled: false
        secret_name: cnpg-authelia-prod-app-user-credentials
        path: password
    encryption_key:
      disabled: false
      secret_name: authelia-encryption-key
      path: encryption-key
